<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Grower Sign In | Keboon Directory</title>

  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="back-link" href="../index.html">← Back to directory</a>

      <div class="brand-header">
        <img
          src="../assets/images/logo-writing.png"
          alt="Keboon"
          class="brand-logo"
        />
      </div>

      <h1>Grower sign in</h1>
      <p class="muted">
        Sign in to manage your grower profile and produce listings.
      </p>

      <form id="signinForm" class="form-stack">
        <label>
          Email
          <input
            type="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </label>

        <label>
          Password
          <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </label>

        <button type="submit" class="primary-button">
          Sign in
        </button>

        <p id="signinMessage" class="form-message"></p>
      </form>

      <p class="small-text">
        New grower?
        <a href="./signup.html">Create an account</a>
      </p>
    </section>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
