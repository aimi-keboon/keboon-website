<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Inbox | Keboon Directory</title>

    <link rel="icon" type="image/png" href="../assets/images/logo.png" />
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body>
    <div
      id="globalLoadingOverlay"
      class="global-loading-overlay"
      aria-hidden="true"
    >
      <div class="loading-card">
        <div class="loading-spinner" aria-hidden="true"></div>
        <p id="globalLoadingText">Loading...</p>
      </div>
    </div>

    <div class="app-shell">
      <header class="app-topbar">
        <div class="app-topbar-inner">
          <div class="app-topbar-left">
            <a href="./dashboard.html">
              <img
                src="../assets/images/logo-writing.png"
                alt="Keboon"
                class="app-topbar-logo"
              />
            </a>

            <div class="app-topbar-title">
              <p class="app-screen-label">Grower app</p>
              <p class="app-screen-title">Inbox</p>
            </div>
          </div>

          <div class="app-topbar-actions">
            <a
              class="app-icon-button inbox-icon-link is-active"
              href="./inbox.html"
              aria-label="Inbox"
              title="Inbox"
            >
              <span class="inbox-unread-dot" aria-hidden="true"></span>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M4 5h16v14H4V5Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path
                  d="M4 13h4l2 3h4l2-3h4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </svg>
            </a>

            <button
              id="signoutButton"
              class="app-icon-button"
              type="button"
              aria-label="Log out"
              title="Log out"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M10 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <path
                  d="M15 8l4 4-4 4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M19 12H9"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="app-main">
        <section class="app-page-header inbox-page-header">
          <div>
            <p class="eyebrow">Mailbox</p>
            <h1>Inbox</h1>
            <p class="muted">
              View enquiries from people interested in your profile and produce.
            </p>
            <p id="mailboxCount" class="inbox-count-text">
              Loading messages...
            </p>
          </div>

          <button
            id="mailboxRefreshButton"
            class="app-icon-button"
            type="button"
            aria-label="Refresh inbox"
            title="Refresh inbox"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M20 6v5h-5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M4 18v-5h5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M18.8 10A7 7 0 0 0 6.3 6.8L4 9"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M5.2 14a7 7 0 0 0 12.5 3.2L20 15"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </section>

        <section class="mailbox-toolbar">
          <div class="mailbox-search-wrap">
            <input
              id="mailboxSearchInput"
              type="search"
              placeholder="Search sender, email, phone, product, or message"
              aria-label="Search inbox"
            />

            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Z"
                stroke="currentColor"
                stroke-width="2"
              />
              <path
                d="m16.2 16.2 4.3 4.3"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </div>

          <div class="mailbox-compact-controls">
            <label class="mailbox-icon-select" title="Filter messages">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M4 6h16l-6 7v5l-4 2v-7L4 6Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
              </svg>

              <select id="mailboxFilter" aria-label="Filter messages">
                <option value="all">All</option>
                <option value="unread">Unread</option>
                <option value="read">Read</option>
              </select>
            </label>

            <label class="mailbox-icon-select" title="Sort messages">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M7 4v16"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <path
                  d="M4 17l3 3 3-3"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M13 6h7M13 12h5M13 18h3"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>

              <select id="mailboxSort" aria-label="Sort messages">
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
              </select>
            </label>
          </div>

          <div class="mailbox-bulk-actions">
            <button
              id="mailboxMarkReadButton"
              class="secondary-button"
              type="button"
            >
              Mark read
            </button>

            <button
              id="mailboxMarkUnreadButton"
              class="secondary-button"
              type="button"
            >
              Mark unread
            </button>

            <button
              id="mailboxDeleteButton"
              class="secondary-button danger-button"
              type="button"
            >
              Delete
            </button>
          </div>
        </section>

        <section class="mailbox-content-card">
          <div id="mailboxList" class="mailbox-list">
            <p class="muted">Loading inbox...</p>
          </div>

          <p id="mailboxMessage" class="form-message"></p>
        </section>
      </main>

      <nav class="app-bottom-nav" aria-label="Grower app navigation">
        <div class="app-bottom-nav-inner">
          <a class="app-bottom-link" href="./dashboard.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z"
                stroke="currentColor"
                stroke-linejoin="round"
              />
            </svg>
            <span>Home</span>
          </a>

          <a class="app-bottom-link" href="./edit-profile.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                stroke="currentColor"
              />
              <path
                d="M4 21a8 8 0 0 1 16 0"
                stroke="currentColor"
                stroke-linecap="round"
              />
            </svg>
            <span>Profile</span>
          </a>

          <a class="app-bottom-link" href="./manage-produce.html">
            <img
              src="../assets/icons/produce.svg"
              alt=""
              class="app-nav-icon-img"
              aria-hidden="true"
            />
            <span>Produce</span>
          </a>

          <a class="app-bottom-link" href="./preview-profile.html">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"
                stroke="currentColor"
                stroke-linejoin="round"
              />
              <path
                d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                stroke="currentColor"
              />
            </svg>
            <span>Preview</span>
          </a>
        </div>
      </nav>
    </div>
    <section
      id="mailboxThreadDrawer"
      class="mailbox-thread-drawer"
      aria-hidden="true"
      inert
    >
      <div class="mailbox-thread-card">
        <div class="mailbox-thread-header">
          <div>
            <p class="eyebrow">Message thread</p>
            <h2 id="mailboxThreadTitle">Enquiry</h2>
            <p id="mailboxThreadMeta" class="muted"></p>
          </div>

          <button
            id="closeMailboxThreadButton"
            class="app-icon-button"
            type="button"
            aria-label="Close message thread"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M6 6l12 12M18 6 6 18"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <div id="mailboxThreadMessages" class="mailbox-thread-messages">
          <p class="muted">Loading thread...</p>
        </div>

        <form id="mailboxReplyForm" class="mailbox-reply-form">
          <label>
            Reply
            <textarea
              name="reply_message"
              rows="4"
              placeholder="Write your reply..."
              required
            ></textarea>
          </label>

          <button type="submit" class="primary-button">Send reply</button>

          <p id="mailboxReplyMessage" class="form-message"></p>
        </form>
      </div>
    </section>
    <script src="../scripts/config.js"></script>
    <script src="../scripts/api.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/app.js"></script>
  </body>
</html>
