<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Reset Password | Keboon Directory</title>

  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <a class="back-link" href="./signin.html">Back to sign in</a>

      <div class="brand-header">
        <img
          src="../assets/images/logo-writing.png"
          alt="Keboon"
          class="brand-logo"
        />
      </div>

      <h1>Reset password</h1>
      <p class="muted">
        Enter your grower account email. If an account exists, we will send a password reset link.
      </p>

      <form id="forgotPasswordForm" class="form-stack">
        <label>
          Email
          <input
            type="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </label>

        <button type="submit" class="primary-button">
          Send reset link
        </button>

        <p id="forgotPasswordMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
</body>
</html>
