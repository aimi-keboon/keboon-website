<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Keboon Directory</title>

    <link rel="icon" type="image/png" href="./assets/images/logo.png" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="public-app">
      <header class="public-header">
        <a href="../index.html" class="public-brand">
          <img
            src="./assets/images/logo-writing.png"
            alt="Keboon"
            class="public-logo"
          />
        </a>

        <nav class="public-nav" aria-label="Public navigation">
          <a
            href="./pages/signin.html"
            class="secondary-button text-button-link"
          >
            Grower sign in
          </a>

          <a href="./pages/signup.html" class="primary-button text-button-link">
            Join as grower
          </a>
        </nav>
      </header>

      <section class="public-hero public-hero-compact">
        <div class="public-hero-content">
          <p class="eyebrow">Local food directory</p>
          <h1>Find nearby food growers</h1>
          <p class="muted">
            Discover growers, gardens, farms, and fresh produce near you.
          </p>
        </div>
      </section>

      <section class="public-directory-shell">
        <section class="public-search-panel">
          <div class="public-search-controls">
            <div class="directory-search-box">
              <label>
                Search
                <div class="directory-search-input-wrap">
                  <input
                    id="directorySearchInput"
                    type="search"
                    placeholder="Search growers, produce, categories, locations"
                  />

                  <button
                    id="directorySearchButton"
                    class="directory-search-icon-button"
                    type="button"
                    aria-label="Search"
                  >
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path
                        d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Z"
                        stroke="currentColor"
                        stroke-width="2"
                      />
                      <path
                        d="m16.2 16.2 4.3 4.3"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                      />
                    </svg>
                  </button>
                </div>
              </label>
            </div>

            <div class="directory-location-actions">
              <button
                id="directoryUseLocationButton"
                class="secondary-button"
                type="button"
              >
                Use my location
              </button>

              <button
                id="directoryShowAllButton"
                class="secondary-button"
                type="button"
              >
                Show all growers
              </button>
            </div>
          </div>

          <p id="directoryStatus" class="small-text">Loading directory...</p>
        </section>

        <section class="directory-layout">
          <div id="directoryMap" class="directory-map"></div>

          <aside class="directory-list-panel">
            <div class="directory-list-header">
              <h2>Growers</h2>
              <p id="directoryCount" class="muted">Loading...</p>
            </div>

            <div id="directoryList" class="directory-list">
              <p class="muted">Loading growers...</p>
            </div>
          </aside>
        </section>
      </section>

      <section id="growerDrawer" class="grower-drawer" aria-hidden="true">
        <div class="grower-drawer-card">
          <button
            id="closeGrowerDrawerButton"
            class="drawer-close-button"
            type="button"
            aria-label="Close grower profile"
          >
            Close
          </button>

          <div id="growerDrawerContent"></div>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="./scripts/config.js"></script>
    <script src="./scripts/api.js"></script>
    <script src="./scripts/auth.js"></script>
    <script src="./scripts/app.js"></script>
  </body>
</html>
